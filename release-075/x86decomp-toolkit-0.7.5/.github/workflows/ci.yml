name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  regression:
    name: regression (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install toolkit test dependencies
        run: python -m pip install -e ".[disassembly,dynamic,symbolic,service,dev]"
      - name: Run contracts
        run: python scripts/validate-contracts.py
      - name: Run regression suite
        run: python -m pytest -q
      - name: Run test-suite self-tests
        run: python -m pytest -q test-suite/tests
        env:
          PYTHONPATH: test-suite/src

  packaging:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install build
      - name: Build toolkit
        run: python -m build --outdir dist
      - name: Build integrated test suite
        run: python -m build test-suite --outdir test-suite/dist
      - name: Clean-install toolkit wheel
        run: |
          python -m venv /tmp/x86decomp-toolkit-wheel
          /tmp/x86decomp-toolkit-wheel/bin/python -m pip install dist/*.whl
          /tmp/x86decomp-toolkit-wheel/bin/x86decomp --help
      - name: Clean-install test-suite wheel
        run: |
          python -m venv /tmp/x86decomp-suite-wheel
          /tmp/x86decomp-suite-wheel/bin/python -m pip install test-suite/dist/*.whl
          /tmp/x86decomp-suite-wheel/bin/x86decomp-test --help

  comprehensive-harness:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install toolkit and suite
        run: |
          python -m pip install -e ".[disassembly,dynamic,symbolic,service,dev]"
          python -m pip install -e "test-suite[dev]"
      - name: Create non-interactive configuration
        run: |
          x86decomp-test init-config \
            --toolkit-root . \
            --output-root ./test-results \
            --config ./x86decomp-test.json \
            --non-interactive \
            --non-strict
      - name: Run comprehensive harness
        run: x86decomp-test run --config ./x86decomp-test.json --verbose
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: x86decomp-test-results
          path: test-results/
