site_name: x86decomp 0.7.5 Docs
site_description: End-user and source-derived documentation for x86decomp-toolkit
  0.7.5
docs_dir: docs
site_dir: site
use_directory_urls: true
theme:
  name: material
  font: false
  features:
  - navigation.instant
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - search.highlight
  - search.suggest
  - content.code.copy
  - content.code.annotate
  - toc.follow
  palette:
  - scheme: default
    primary: deep purple
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: deep purple
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
plugins:
- search:
    lang: en
markdown_extensions:
- admonition
- attr_list
- def_list
- footnotes
- md_in_html
- tables
- toc:
    permalink: true
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.details
- pymdownx.tabbed
extra_css:
- assets/x86decomp-material-overrides.css
validation:
  nav:
    omitted_files: ignore
  links:
    absolute_links: relative_to_docs
nav:
- Home: index.md
- Getting Started: getting-started.md
- Workflows:
  - Workflow Guide: workflows.md
  - Local LLM C Generation: local-llm.md
  - Project Examples: project-examples.md
- Reference:
  - Overview: reference.md
  - Architecture: architecture.md
  - Commands: commands/index.md
  - Schemas: schemas.md
  - Integrations: integrations.md
  - Source Modules: features/index.md
  - Function Index: functions/index.md
  - Tests: tests/index.md
- Release Evidence:
  - Overview: release-evidence.md
  - Verification: verification.md
  - Source Coverage: source-coverage.md
  - Changelog: changelog.md
  - About: about.md
